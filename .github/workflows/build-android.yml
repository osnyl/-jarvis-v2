name: Build Android APK
on:
  push:
    branches: [master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Prebuild and patch lint
        run: |
          npx expo prebuild --platform android

          if ! grep -q "lintOptions" android/app/build.gradle; then
            sed -i '/android {/a\    lintOptions {\n        checkReleaseBuilds false\n        abortOnError false\n    }' android/app/build.gradle
          fi
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/jarvis-release.keystore
      - name: Configure signing
        run: |
          python3 << 'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing_block = """signingConfigs {
              release {
                  storeFile file('jarvis-release.keystore')
                  storePassword System.getenv("MYAPP_RELEASE_STORE_PASSWORD")
                  keyAlias System.getenv("MYAPP_RELEASE_KEY_ALIAS")
                  keyPassword System.getenv("MYAPP_RELEASE_KEY_PASSWORD")
              }
          """

          content = re.sub(r'signingConfigs\s*\{', signing_block, content, count=1)
          content = content.replace('signingConfig signingConfigs.debug', 'signingConfig signingConfigs.release')

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          PYEOF
      - name: Build APK
        env:
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease --max-workers=2 --no-daemon
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Jarvis APK v${{ github.run_number }}
          body: |
            APK signé de Mini-Jarvis
            - Commit: ${{ github.event.head_commit.message }}
          files: android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
